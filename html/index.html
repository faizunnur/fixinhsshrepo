<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fixingSSH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .badge {
            display: inline-block;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #888;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
        }

        .project-name {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        .accent {
            color: #4ade80;
            -webkit-text-fill-color: #4ade80;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #4ade80, transparent);
            margin: 1.5rem auto;
            border-radius: 1px;
        }

        .tagline {
            font-size: 1rem;
            color: #555;
            letter-spacing: 0.05em;
            max-width: 400px;
            line-height: 1.6;
        }

        .status {
            margin-top: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #444;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="badge">Project</div>
        <h1 class="project-name">fixing<span class="accent">SSH</span></h1>
        <div class="divider"></div>
        <p class="tagline">Diagnosing and resolving secure shell configurations with precision.</p>
        <div class="status">
            <div class="status-dot"></div>
            <span>In Progress</span>
        </div>
    </div>
</body>
</html>
