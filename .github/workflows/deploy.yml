name: Deploy fixingSSH

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check existing AWS resources
        id: check_ec2
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          EXISTING_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text 2>/dev/null || echo "None")
          KEY_EXISTS=$(aws ec2 describe-key-pairs \
            --filters "Name=key-name,Values=$PROJECT-key" \
            --query "KeyPairs[0].KeyName" --output text 2>/dev/null || echo "None")
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$PROJECT-sg" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "None")
          if [ "$EXISTING_IP" != "None" ] && [ "$EXISTING_IP" != "null" ] && [ -n "$EXISTING_IP" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "ip=$EXISTING_IP" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          echo "key_exists=$KEY_EXISTS" >> $GITHUB_OUTPUT
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Create S3 state bucket
        if: steps.check_ec2.outputs.exists != 'true'
        id: s3_bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_STR="devops-state-${{ secrets.PROJECT_NAME }}-$ACCOUNT_ID"
          echo "bucket_name=$BUCKET_STR" >> $GITHUB_OUTPUT
          if ! aws s3api head-bucket --bucket "$BUCKET_STR" 2>/dev/null; then
            echo "Bucket does not exist. Creating $BUCKET_STR..."
            aws s3 mb s3://$BUCKET_STR --region us-east-1
            echo "Waiting for S3 bucket $BUCKET_STR to become fully available..."
            aws s3api wait bucket-exists --bucket "$BUCKET_STR"
          else
            echo "Bucket $BUCKET_STR already exists and is accessible."
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Setup Terraform
        if: steps.check_ec2.outputs.exists != 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.s3_bucket.outputs.bucket_name }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Import existing resources
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          KEY="${{ steps.check_ec2.outputs.key_exists }}"
          SG="${{ steps.check_ec2.outputs.sg_id }}"
          [ "$KEY" != "None" ] && terraform import -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" aws_key_pair.deployer "${{ secrets.PROJECT_NAME }}-key" 2>/dev/null || true
          [ "$SG" != "None" ] && terraform import -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" aws_security_group.sg "$SG" 2>/dev/null || true
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Terraform Plan
        if: steps.check_ec2.outputs.exists != 'true'
        run: terraform plan -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" -out=tfplan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Terraform Apply
        if: steps.check_ec2.outputs.exists != 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Get IP
        id: get_ip
        run: |
          if [ "${{ steps.check_ec2.outputs.exists }}" == "true" ]; then
            echo "ip=${{ steps.check_ec2.outputs.ip }}" >> $GITHUB_OUTPUT
          else
            echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          fi
        working-directory: terraform

  configure:
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          cat << 'EOF' > /tmp/ssh_key
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 /tmp/ssh_key

      - name: Wait for SSH
        run: |
          for i in $(seq 1 15); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/ssh_key ubuntu@${{ needs.provision.outputs.server_ip }} echo ok \
              && break || sleep 5
          done

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Run Ansible Playbook
        run: |
          ansible-playbook \
            -i "${{ needs.provision.outputs.server_ip }}," \
            --private-key /tmp/ssh_key \
            -u ubuntu \
            ansible/playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

  verify:
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Health Check
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Running health check against http://$SERVER_IP"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://$SERVER_IP || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed with HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [provision, configure, verify]
    steps:
      - name: Print Live URL
        run: |
          echo "============================================"
          echo "  Deployment of fixingSSH complete!"
          echo "  Region:  us-east-1"
          echo "  Live URL: http://${{ needs.provision.outputs.server_ip }}"
          echo "============================================"